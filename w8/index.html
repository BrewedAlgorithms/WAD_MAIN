<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center mb-4">Event Registration</h3>

        <form class="needs-validation" novalidate>

            <!-- Name -->
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="name" placeholder="Name" required
                       data-bs-toggle="tooltip" title="Enter your full name">
                <label for="name">Full Name</label>
                <div class="invalid-feedback">Name is required</div>
            </div>

            <!-- Email -->
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="Email" required
                       data-bs-toggle="tooltip" title="Enter valid email">
                <label for="email">Email address</label>
                <div class="invalid-feedback">Valid email required</div>
            </div>

            <!-- Phone -->
            <div class="form-floating mb-3">
                <input type="tel" class="form-control" id="phone" placeholder="Phone" required
                       data-bs-toggle="tooltip" title="Enter your phone number">
                <label for="phone">Phone</label>
                <div class="invalid-feedback">Phone is required</div>
            </div>

            <!-- Event Select -->
            <div class="mb-3">
                <label class="form-label">Select Event</label>
                <select class="form-select" required data-bs-toggle="tooltip" title="Choose an event">
                    <option value="">Choose...</option>
                    <option>Workshop</option>
                    <option>Seminar</option>
                    <option>Hackathon</option>
                </select>
                <div class="invalid-feedback">Please select an event</div>
            </div>

            <!-- Submit -->
            <button class="btn btn-primary w-100" type="submit">Register</button>

        </form>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Enable validation
    (() => {
        const forms = document.querySelectorAll('.needs-validation');
        forms.forEach(form => {
            form.addEventListener('submit', e => {
                if (!form.checkValidity()) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                form.classList.add('was-validated');
            });
        });
    })();

    // Enable tooltips
    const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
    tooltipTriggerList.forEach(
      el => new bootstrap.Tooltip(el)
    );
</script>

</body>
</html>
